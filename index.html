<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Janvi ❤️</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:400px;
}

h1{
    color:#ff4d6d;
}

p{
    font-size:18px;
    color:#444;
    margin-bottom:30px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#888;
    color:white;
    position:relative;
}

.hearts{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">

<h1>Hi Janvi ❤️</h1>

<p>
From the moment I started talking with you, something felt different.
You make my days brighter and my heart happier.
I just wanted to tell you something honestly today…
</p>

<h2>Do you like me?</h2>

<button id="yes">Yes 😊</button>
<button id="no">No 😅</button>

</div>

<script>

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.position="absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

document.getElementById("yes").onclick = function(){
    document.body.innerHTML =
    "<h1 style='font-family:sans-serif;color:white;text-align:center'>❤️ You just made Neel the happiest person ❤️</h1>";
}

// floating hearts

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"%";
    heart.style.fontSize=(Math.random()*20+10)+"px";
    document.querySelector(".hearts").appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
